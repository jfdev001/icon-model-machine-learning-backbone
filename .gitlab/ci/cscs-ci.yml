.common_cscs_ci:
  variables:
    APK_CACHE_DIR: ${CI_PROJECT_DIR}/.ci_dir/apk-cache
    CSCS_CI_COMMIT_SHA: ${CI_COMMIT_SHA}
    CSCS_CI_TAG: merge2rc
    GIT_STRATEGY: none
  before_script:
    - mkdir -p "${APK_CACHE_DIR}"
    - apk --cache-dir "${APK_CACHE_DIR}" --update-cache add py3-ratelim py3-requests py3-retry py3-yaml python3
    - apk --cache-dir "${APK_CACHE_DIR}" cache clean
  script:
    - |
      python3 - <<\_EOF
      import http
      import os
      import re

      import ratelim
      import requests
      import retry
      import yaml


      def get_status_description(status):
          return f"{status}: {http.client.responses.get(status, 'Unknown status')}"


      def trigger_ci(builder, ci_sha, ci_tag, ci_token):
          url = "https://cicd-ext-mw.cscs.ch/ci/pipeline/trigger"
          headers = {"Content-Type": "application/x-yaml"}
          data = yaml.dump(
              {
                  "ref": f"sha:{ci_sha}",
                  "pipeline": builder,
                  "variables": {
                      "TAG": ci_tag,
                      # Do not report back the status (we will fetch it ourselves):
                      "CSCS_NOTIFICATION_CONTEXT": "__discard-notification",
                  },
              }
          )
          auth = tuple(ci_token.split(":"))

          response = requests.post(url, headers=headers, data=data, auth=auth)

          if response.status_code == http.HTTPStatus.OK:
              match = re.search(
                  r"https://cicd-ext-mw\.cscs\.ch/ci/pipeline/trigger\?reqId=[\w\d]+",
                  response.text,
              )
              if match:
                  status_url = match.group(0)
                  return status_url
              else:
                  raise AssertionError(
                      f"Failed to extract status url from\n---\n{response.text}\n---"
                  )
          else:
              raise AssertionError(
                  f"Failed to trigger CSCS CI"
                  f" ({get_status_description(response.status_code)})"
              )


      def wait_for_ci(status_url, poll_timeout=30, max_failed_requests=3):
          trigger_success = {"triggered_successfully"}
          trigger_failure = {"failed", "failure"}
          trigger_finished = False

          pipeline_success = {"success"}
          pipeline_failure = {"failed", "canceled", "skipped"}

          @retry.retry(tries=max_failed_requests)
          @ratelim.greedy(1, poll_timeout)
          def get_response():
              response = requests.get(status_url)
              if response.status_code != http.HTTPStatus.OK:
                  raise AssertionError(
                      f"Failed to request pipeline status from {status_url}"
                      f" ({get_status_description(response.status_code)})"
                  )
              return response

          while True:
              response_json = get_response().json()

              trigger_status = response_json["status"]

              if not trigger_finished:
                  print(
                      f"Waiting for the trigger: {trigger_status}"
                      f" ({response_json['full_log_url']})",
                      flush=True,
                  )
                  if trigger_status in trigger_success:
                      trigger_finished = True
                  elif trigger_status in trigger_failure:
                      return False
                  else:
                      continue

              pipeline_status = response_json["pipeline_status"]

              print(
                  f"Waiting for the pipeline: {pipeline_status}"
                  f" ({response_json['url']})",
                  flush=True,
              )

              if pipeline_status in pipeline_success:
                  return True
              elif pipeline_status in pipeline_failure:
                  return False


      builder = os.environ.get("CSCS_CI_BUILDER")
      ci_sha = os.environ.get("CSCS_CI_COMMIT_SHA")
      ci_tag = os.environ.get("CSCS_CI_TAG")
      ci_token = os.environ.get("CSCS_CI_TOKEN")
      print(
          f"Triggering {builder} for {ci_sha} ({ci_tag})",
          flush=True,
      )
      status_url = trigger_ci(builder, ci_sha, ci_tag, ci_token)
      pipeline_succeeded = wait_for_ci(status_url)
      exit(0 if pipeline_succeeded else 1)
      _EOF
  tags:
    - alpine
  # Dont want parent job to timeout before child job finishes
  timeout: 6h
  cache:
    - key: apk-cscs-ci
      paths:
        - ${APK_CACHE_DIR}
