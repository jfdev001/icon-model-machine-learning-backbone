workflow:
  auto_cancel:
    on_new_commit: interruptible
  rules:
    - if: $CI_PROJECT_PATH == "icon/icon-model"
      when: never
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "web"
      auto_cancel:
        on_new_commit: none

stages:
  - basic
  - system
  - test
  - documentation

.colorized:
  variables:
    DEFAULT: '\033[0m'
    RED: '\033[0;31m'

.ci_dir:
  variables:
    CI_GITIGNORE_DIR: ${CI_PROJECT_DIR}/.ci_dir

.common_pre_commit:
  stage: basic
  extends:
    - .colorized
    - .ci_dir
  variables:
    APK_CACHE_DIR: ${CI_GITIGNORE_DIR}/apk-cache
    PRE_COMMIT_HOME: ${CI_GITIGNORE_DIR}/pre-commit
    GIT_SUBMODULE_STRATEGY: none
  before_script:
    - mkdir -p "${APK_CACHE_DIR}"
    - apk --cache-dir "${APK_CACHE_DIR}" --update-cache add git pre-commit
    - apk --cache-dir "${APK_CACHE_DIR}" cache clean
    - |
      # Verify pre-commit cache
      (
        set -o pipefail
        python3 --version | diff - "${PRE_COMMIT_HOME}/python_version.txt" 2>/dev/null || {
          rm -rf "${PRE_COMMIT_HOME}"
          mkdir -p "${PRE_COMMIT_HOME}"
          python3 --version > "${PRE_COMMIT_HOME}/python_version.txt"
        }
      )
  tags:
    - alpine
  cache:
    - key: apk-pre-commit
      paths:
        - ${APK_CACHE_DIR}
    - key:
        prefix: ${CI_JOB_NAME_SLUG}
        files:
          - .pre-commit-config.yaml
      paths:
        - ${PRE_COMMIT_HOME}
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  interruptible: true

Licenses:
  extends: .common_pre_commit
  script:
    - |
      # pre-commit run --hook-stage manual reuse
      pre-commit run --color=always --hook-stage manual reuse || {
        printf "${RED}You can reproduce this check locally with \`pre-commit run --hook-stage manual reuse\`.
      See also ${CI_PROJECT_URL}/-/blob/${CI_DEFAULT_BRANCH}/CONTRIBUTING.md#coding-style.\n${DEFAULT}"
        exit 1
      }
    - ${CI_PROJECT_DIR}/scripts/ci_scripts/check_license.py

Coding Style:
  extends: .common_pre_commit
  variables:
    STYLE_PATCH: style.patch
  script:
    - |
      # pre-commit run --all-files
      pre-commit run --color=always --all-files || {
        git diff --ignore-submodules --patch-with-raw > "${STYLE_PATCH}" && {
          test -s "${STYLE_PATCH}" && {
            printf "${RED}The issues can be resolved with the patch (see artifacts):
        ${CI_JOB_URL}/artifacts/raw/${STYLE_PATCH}.\n${DEFAULT}"
          } || {
            printf "${RED}The issues cannot be resolved with a patch.\n${DEFAULT}"
            rm -f "${STYLE_PATCH}"
          }
        } || {
          printf "${RED}Failed to generate a patch file.\n${DEFAULT}"
          rm -f "${STYLE_PATCH}"
        }
        printf "${RED}You can reproduce this check locally with \`pre-commit run --all-files\`.
      See also ${CI_PROJECT_URL}/-/blob/${CI_DEFAULT_BRANCH}/CONTRIBUTING.md#coding-style.\n${DEFAULT}"
        exit 1
      }
  artifacts:
    paths:
      - ${STYLE_PATCH}
    expire_in: 1 week
    when: on_failure

General Style:
  stage: basic
  variables:
    GIT_SUBMODULE_STRATEGY: normal
    GIT_SUBMODULE_PATHS: externals/art externals/jsbach
  before_script:
    - pip install pyyaml click pandas
  script:
    # TODO: we should check all ICON source files, as well as all source files
    # of the bundled libraries that are built as part of ICON:
    #   - externals/art
    #   - externals/dace_icon
    #   - externals/emvorado
    #   - externals/jsbach
    # However, we cannot currently do that because they will fail the tests.
    # Therefore, we check as many of them as possible:
    - ./scripts/ci_scripts/check_encoding.sh 'src' 'support' ${GIT_SUBMODULE_PATHS}
    - ./scripts/ci_scripts/check_src_noexec.sh 'src' 'support' 'externals/jsbach'
    - ./scripts/ci_scripts/check_fortran.py 'src' 'support' ${GIT_SUBMODULE_PATHS}
    - ./scripts/ci_scripts/check_granule_encapsulation.sh
    - python scripts/experiments/yaml_experiment_test_processor.py

  tags:
    # Choose a runner with GNU find, GNU grep and bash:
    - conda
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  interruptible: true

Autoconf:
  stage: basic
  extends:
    - .colorized
    - .ci_dir
  variables:
    APK_CACHE_DIR: ${CI_GITIGNORE_DIR}/apk-cache
    AUTOCONF_VERSION: "2.69"
    AUTOCONF_SHA256: 954bd69b391edc12d6a4a51a2dd1476543da5c6bbf05a95b59dc0dd6fd4c2969
    AUTOCONF_DIR: ${CI_GITIGNORE_DIR}/autoconf
    AUTOCONF_PATCH: autoconf.patch
    GIT_SUBMODULE_STRATEGY: none
  before_script:
    - mkdir -p "${APK_CACHE_DIR}"
    - apk --cache-dir "${APK_CACHE_DIR}" --update-cache add automake curl git m4 make perl
    - apk --cache-dir "${APK_CACHE_DIR}" cache clean
    - |
      # Fetching Autoconf
      test -f "${AUTOCONF_DIR}/autoconf-${AUTOCONF_VERSION}.tar.gz" && \
      echo "${AUTOCONF_SHA256} ${AUTOCONF_DIR}/autoconf-${AUTOCONF_VERSION}.tar.gz" | sha256sum -c || \
      (
        set -x
        mkdir -p "${AUTOCONF_DIR}" && \
        cd "${AUTOCONF_DIR}" && \
        {
          curl -OL --connect-timeout 10 "https://ftpmirror.gnu.org/gnu/autoconf/autoconf-${AUTOCONF_VERSION}.tar.gz" || \
          curl -L -o "autoconf-${AUTOCONF_VERSION}.tar.gz" "https://mirror.spack.io/_source-cache/archive/${AUTOCONF_SHA256:0:2}/${AUTOCONF_SHA256}.tar.gz"
        } && \
        echo "${AUTOCONF_SHA256} autoconf-${AUTOCONF_VERSION}.tar.gz" | sha256sum -c
      ) || {
        printf "${RED}Failed to fetch Autoconf ${AUTOCONF_VERSION}.\n${DEFAULT}"
        exit 1
      }
    - |
      # Installing Autoconf
      (
        set -x
        cd "${AUTOCONF_DIR}" && \
        tar xfz autoconf-${AUTOCONF_VERSION}.tar.gz --strip-components=1 && \
        ./configure && \
        make -j4 install
      ) || {
        printf "${RED}Failed to install Autoconf ${AUTOCONF_VERSION}.\n${DEFAULT}"
        exit 1
      }
  script:
    - autoreconf -fvi
    - |
      # Checking the consistency
      git diff --ignore-submodules --patch-with-raw > "${AUTOCONF_PATCH}" || {
        printf "${RED}Failed to generate a patch file.\n${DEFAULT}"
        rm -f "${AUTOCONF_PATCH}"
        exit 1
      }
      test ! -s "${AUTOCONF_PATCH}" || {
        printf "${RED}The automatically generated Autotools files (e.g. 'configure') \
      are inconsistent with 'configure.ac' and/or Autoconf ${AUTOCONF_VERSION}.
      The issue can be resolved with the patch (see artifacts):
        ${CI_JOB_URL}/artifacts/raw/${AUTOCONF_PATCH}.\n${DEFAULT}"
          exit 1
      }
  tags:
    - alpine
  cache:
    - key: apk-autoconf-prereqs
      paths:
        - ${APK_CACHE_DIR}
    - key: ${AUTOCONF_SHA256}
      paths:
        - ${AUTOCONF_DIR}/autoconf-${AUTOCONF_VERSION}.tar.gz
  artifacts:
    paths:
      - ${AUTOCONF_PATCH}
    expire_in: 1 week
    when: on_failure
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - config.h.in
        - configure
        - configure.ac
        - m4/**/*
        - utils/config.guess
        - utils/config.sub
        - utils/install-sh
  interruptible: true

Iconbot:
  stage: basic
  variables:
    ICONBOT_TAG: production
    ICONBOT_REPO: "https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.dkrz.de/icon/ci-tooling/iconbot.git"
    ICONBOT_DIR: iconbot
    ICONBOT_CONFIG: .gitlab/iconbot/notifier.yml
    GIT_SUBMODULE_STRATEGY: none
  before_script:
    - git clone --branch "${ICONBOT_TAG}" --depth 1 "${ICONBOT_REPO}" "${ICONBOT_DIR}"
  script:
    - python3 -m pip install -r "${ICONBOT_DIR}/requirements/notifier/config.txt"
    - python3 "${ICONBOT_DIR}/src/notifier/config.py" "${ICONBOT_CONFIG}"
  tags:
    - sphinx
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - ${ICONBOT_CONFIG}
  interruptible: true

Granules:
  stage: test
  needs: []
  trigger:
    include: .gitlab/ci/granules.yml
    strategy: depend
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - .gitlab/ci/granules.yml
        - externals/fortran-support
        - externals/iconmath
        - externals/probtest
        - src/atm_phy_schemes/mo_lookup_tables_constants.f90
        - src/atm_phy_schemes/mo_thdyn_functions.f90
        - src/atm_phy_schemes/mo_2mom_mcrph_types.f90
        - src/atm_phy_schemes/mo_2mom_mcrph_setup.f90
        - src/configure_model/mo_2mom_mcrph_config.f90
        - src/granules/microphysics_1mom_schemes/**/*
        - src/shared/mo_kind.f90
        - src/shared/mo_physical_constants.f90
        - src/shared/mo_impl_constants.f90
        - src/shared/mo_impl_constants_grf.f90
        - test/microphysics_1mom_schemes/**/*

Namelist Overview:
  stage: documentation
  needs: []
  variables:
    GIT_SUBMODULE_STRATEGY: none
  script:
    - cd doc/Namelist_overview
    - pdflatex Namelist_overview.tex
    # needs to be called a 2nd time for generating the ToC
    - pdflatex Namelist_overview.tex
  artifacts:
    paths:
      - doc/Namelist_overview/Namelist_overview.pdf
    expire_in: 1 day
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - doc/Namelist_overview/*.tex
  tags:
    - latex, dkrz
  interruptible: true

.common_html:
  extends: .ci_dir
  stage: documentation
  needs: []
  variables:
    PIP_CACHE_DIR: ${CI_GITIGNORE_DIR}/pip-cache
    GIT_SUBMODULE_STRATEGY: none
  before_script:
    - python3 -m pip install --root-user-action=ignore --upgrade pip
    - >
      python3 -m pip install --root-user-action=ignore
      myst-parser
      pydata-sphinx-theme
      sphinx-design
  script:
    - sphinx-build -W --keep-going -w warnings.html -b html doc/www build/html
    - test -s warnings.html || rm -f warnings.html
    - mv build/html public
  cache:
    key: pip-docs
    paths:
      - ${PIP_CACHE_DIR}
  tags:
    - sphinx, dkrz
  artifacts:
    when: always
    paths:
      - public
      - warnings.html
    expire_in: 1 day

Generate HTML:
  extends: .common_html
  variables:
    REVIEW_URL: https://${CI_PAGES_HOSTNAME}/-/${CI_PROJECT_NAME}/-/jobs/${CI_JOB_ID}/artifacts/public/index.html
  environment:
    name: review/${CI_COMMIT_REF_SLUG}
    url: ${REVIEW_URL}
  script:
    - !reference [.common_html, script]
    - echo "${REVIEW_URL}"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: never
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  interruptible: true

Generate and publish HTML:
  extends: .common_html
  pages: true
  rules:
    - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH
      when: never
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
    - if: $CI_PIPELINE_SOURCE == "push"
  manual_confirmation: This job updates the GitLab Pages of the current project

# CSCS test infrastructure adapter
include: .gitlab/ci/cscs-ci.yml

cscs-ci/santis_cpu:
  stage: system
  needs: []
  extends: .common_cscs_ci
  variables:
    CSCS_CI_BUILDER: santis-cpu
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
    - if: $CSCS_CI_INACTIVE_BUILDERS =~ "/(^|,)santis-cpu(,|$)/"
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual

cscs-ci/santis_gpu:
  stage: system
  needs: []
  extends: .common_cscs_ci
  variables:
    CSCS_CI_BUILDER: santis-gpu
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
    - if: $CSCS_CI_INACTIVE_BUILDERS =~ "/(^|,)santis-gpu(,|$)/"
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
